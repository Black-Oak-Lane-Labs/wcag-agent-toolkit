# .github/workflows/a11y.yml
# Hard-control accessibility gate. Fails the build on any axe-core violation.
# Setup instructions: see ci-setup.md in the toolkit.
# Three ADJUST points below; everything else can stay as-is for most Node projects.

name: accessibility

on:
  pull_request:
  push:
    branches: [main]

jobs:
  axe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # ADJUST 1: your build command, if your app needs one before serving.
      - name: Build
        run: npm run build

      # ADJUST 2: the command that serves your app, and the port it serves on.
      # npx wait-on holds the job until the server responds.
      - name: Start app
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 60000

      # ADJUST 3: list every route to scan, comma separated. Every page counts.
      - name: Run axe scan
        env:
          A11Y_BASE_URL: http://localhost:3000
          A11Y_ROUTES: "/,/about,/contact"
        run: node ci/axe-scan.mjs

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      # Assumes your project lint config includes accessibility rules
      # (eslint-plugin-jsx-a11y for React; see ci-setup.md for other stacks).
      - name: Lint
        run: npm run lint
